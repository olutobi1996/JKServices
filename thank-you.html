<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JK Property Services | Professional Property Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
.thank-you{
    min-height:100vh;
    background:#0A0A0A;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:80px 20px;
    position:relative;
    overflow:hidden;
}

.thank-you::before{
    content:'';
    position:absolute;
    width:700px;
    height:700px;
    border:1px solid rgba(184,150,12,.08);
    border-radius:50%;
    top:-250px;
    right:-250px;
}

.thank-you-card{

    max-width:760px;
    width:100%;

    background:#ffffff;
    border-radius:10px;

    padding:70px;

    text-align:center;

    box-shadow:
    0 40px 80px rgba(0,0,0,.25);
}

.thank-icon{

    width:90px;
    height:90px;

    margin:auto auto 35px;

    border-radius:50%;

    background:#B8960C;

    color:#0A0A0A;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:42px;
    font-weight:bold;

}

.thank-you h1{

    font-family:'Playfair Display',serif;
    font-size:54px;
    color:#111;
    margin-bottom:20px;

}

.lead{

    max-width:560px;
    margin:0 auto 40px;
    color:#555;
    line-height:1.8;
    font-size:17px;

}

.promise-box{

    background:#f7f7f5;

    border:1px solid rgba(184,150,12,.15);

    border-radius:8px;

    padding:30px;

    display:grid;
    gap:18px;

    margin-bottom:45px;

    font-weight:600;

}

.buttons{

    display:flex;
    justify-content:center;
    gap:18px;
    flex-wrap:wrap;

}

.btn-gold{

    background:#B8960C;
    color:#111;
    text-decoration:none;
    padding:16px 34px;
    font-weight:700;
    border-radius:4px;

}

.btn-outline{

    border:1px solid #B8960C;
    color:#B8960C;
    text-decoration:none;
    padding:16px 34px;
    border-radius:4px;
    font-weight:600;

}

.btn-gold:hover{
    background:#D4AC2A;
}

.btn-outline:hover{

    background:#B8960C;
    color:white;

}
</style>
<section class="thank-you">

    <div class="thank-you-card">

        <div class="thank-icon">
            ✓
        </div>

        <span class="section-label">ENQUIRY RECEIVED</span>

        <h1>Thank You.</h1>

        <p class="lead">
            We've successfully received your enquiry.
            One of our team will review your request and
            get back to you as soon as possible.
        </p>

        <div class="promise-box">

            <div>
                ✓ Free No-Obligation Quote
            </div>

            <div>
                ✓ Local Professional Team
            </div>

            <div>
                ✓ Usually Respond Within One Working Day
            </div>

        </div>

        <div class="buttons">

            <a href="/" class="btn-gold">
                Return Home
            </a>

            <a href="tel:01371XXXXXX" class="btn-outline">
                Call Us
            </a>

        </div>

    </div>

</section>
